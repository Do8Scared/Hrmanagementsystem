<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Performance - Corazon Travel and Tours</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../css/styles.css">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Nunito', 'system-ui', 'sans-serif'] },
          colors: {
            border: "var(--border)",
            input: "var(--input)",
            ring: "var(--ring)",
            background: "var(--background)",
            foreground: "var(--foreground)",
            primary: { DEFAULT: "var(--primary)", foreground: "var(--primary-foreground)" },
            secondary: { DEFAULT: "var(--secondary)", foreground: "var(--secondary-foreground)" },
            accent: { DEFAULT: "var(--accent)", foreground: "var(--accent-foreground)" },
            card: { DEFAULT: "var(--card)", foreground: "var(--card-foreground)" },
          }
        }
      }
    }
  </script>
  
  <script src="https://unpkg.com/lucide@latest"></script>

  <style type="text/tailwindcss">
    @layer base {
      * { @apply border-border outline-ring/50; }
      body { @apply bg-background text-foreground; font-family: var(--font-family); }
    }
  </style>
</head>
<body class="bg-background text-foreground h-screen overflow-hidden flex">

  <!-- Sidebar -->
  <aside id="sidebar" class="flex flex-col flex-shrink-0 transition-all duration-300 w-64" style="background: var(--sidebar)">
    <div id="sidebar-logo-container" class="flex items-center border-b border-white/10 px-3 py-3">
      <img id="sidebar-logo-full" src="../assets/corazon_logo.png" alt="Corazon Travel and Tours" class="h-12 w-auto object-contain">
      <div id="sidebar-logo-mini" class="w-9 h-9 rounded-lg overflow-hidden flex-shrink-0 hidden">
        <img src="../assets/corazon_logo.png" alt="Corazon" class="w-full h-full object-cover">
      </div>
    </div>

    <div id="sidebar-role" class="px-4 pt-3 pb-1.5">
      <div class="text-xs uppercase tracking-wider font-bold" style="color: var(--sidebar-primary); opacity: 0.85;">
        Employee Portal
      </div>
    </div>

    <nav class="flex-1 px-2 py-2 space-y-0.5 overflow-y-auto sidebar-scroll">
      <a href="employee-dashboard.html" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all duration-150 hover:text-white/90 nav-item" style="color: rgba(255,245,233,0.55);">
        <div class="relative flex-shrink-0"><i data-lucide="layout-dashboard" style="width: 18px; height: 18px;"></i></div>
        <span class="truncate nav-label">Dashboard</span>
      </a>

      <a href="employee-profile.html" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all duration-150 hover:text-white/90 nav-item" style="color: rgba(255,245,233,0.55);">
        <div class="relative flex-shrink-0"><i data-lucide="user" style="width: 18px; height: 18px;"></i></div>
        <span class="truncate nav-label">My Profile</span>
      </a>

      <a href="employee-attendance.html" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all duration-150 hover:text-white/90 nav-item" style="color: rgba(255,245,233,0.55);">
        <div class="relative flex-shrink-0"><i data-lucide="clock" style="width: 18px; height: 18px;"></i></div>
        <span class="truncate nav-label">My Attendance</span>
      </a>

      <a href="employee-leave.html" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all duration-150 hover:text-white/90 nav-item" style="color: rgba(255,245,233,0.55);">
        <div class="relative flex-shrink-0"><i data-lucide="calendar-days" style="width: 18px; height: 18px;"></i></div>
        <span class="truncate nav-label">My Leaves</span>
      </a>

      <a href="employee-payslips.html" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all duration-150 hover:text-white/90 nav-item" style="color: rgba(255,245,233,0.55);">
        <div class="relative flex-shrink-0"><i data-lucide="dollar-sign" style="width: 18px; height: 18px;"></i></div>
        <span class="truncate nav-label">My Payslips</span>
      </a>
      
      <a href="employee-performance.html" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all duration-150 text-white font-bold nav-item" style="background: rgba(232,168,0,0.18); color: #FFF5E9;">
        <div class="relative flex-shrink-0"><i data-lucide="trending-up" style="width: 18px; height: 18px; color: var(--sidebar-primary);"></i></div>
        <span class="truncate nav-label">My Performance</span>
        <span class="ml-auto w-1.5 h-1.5 rounded-full nav-indicator" style="background: var(--sidebar-primary)"></span>
      </a>

      <a href="employee-hrcases.html" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all duration-150 hover:text-white/90 nav-item" style="color: rgba(255,245,233,0.55);">
        <div class="relative flex-shrink-0">
          <i data-lucide="shield-alert" style="width: 18px; height: 18px;"></i>
          <span class="absolute -top-0.5 -right-0.5 w-2 h-2 bg-amber-400 rounded-full hidden" id="er-badge"></span>
        </div>
        <span class="truncate nav-label">HR Admin / ER Cases</span>
      </a>
    </nav>

    <div class="border-t border-white/10 p-3">
      <div id="sidebar-user-full" class="space-y-2">
        <div class="flex items-center gap-3 px-2 py-2 rounded-lg hover:bg-white/10 transition-colors cursor-pointer">
          <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0" style="background: var(--sidebar-primary)">
            <span class="text-xs font-bold" style="color: var(--sidebar-primary-foreground)" id="sidebar-initials">AD</span>
          </div>
          <div class="flex-1 min-w-0">
            <div class="text-xs font-bold truncate" style="color: var(--sidebar-foreground)" id="sidebar-name">Alex Diaz</div>
            <div class="text-xs truncate" style="color: rgba(255,245,233,0.45)" id="sidebar-role-text">Senior Backend Developer</div>
          </div>
        </div>
        <button onclick="window.location.href='../index.html'" class="w-full flex items-center gap-2 px-2 py-2 rounded-lg text-red-400/80 hover:text-red-400 hover:bg-red-500/10 text-xs transition-all">
          <i data-lucide="log-out" style="width: 14px; height: 14px;"></i>
          <span>Log Out</span>
        </button>
      </div>
      <div id="sidebar-user-mini" class="flex flex-col items-center gap-2 hidden">
        <div class="w-8 h-8 rounded-full flex items-center justify-center" style="background: var(--sidebar-primary)">
          <span class="text-xs font-bold" style="color: var(--sidebar-primary-foreground)">AD</span>
        </div>
        <button onclick="window.location.href='../index.html'" class="text-red-400/80 hover:text-red-400 transition-colors" title="Log Out">
          <i data-lucide="log-out" style="width: 14px; height: 14px;"></i>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main Area -->
  <div class="flex flex-col flex-1 min-w-0 overflow-hidden">
    <!-- Top Header -->
    <header class="flex items-center justify-between px-6 h-16 bg-white border-b border-border flex-shrink-0 relative z-20">
      <div class="flex items-center gap-4">
        <button id="sidebar-toggle" class="p-1.5 rounded-lg text-muted-foreground hover:bg-secondary hover:text-foreground transition-colors">
          <i data-lucide="menu" style="width: 18px; height: 18px;" id="menu-icon"></i>
        </button>
        <div>
          <h1 class="text-foreground font-semibold">My Performance</h1>
          <p class="text-muted-foreground text-xs" id="header-date">Tuesday, June 16, 2026</p>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <!-- Notification Dropdown -->
        <div class="relative">
          <button id="notif-btn" class="relative p-2 rounded-lg text-muted-foreground hover:bg-secondary hover:text-foreground transition-colors">
            <i data-lucide="bell" style="width: 18px; height: 18px;"></i>
            <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
          </button>
          
          <div id="notif-dropdown" class="hidden absolute right-0 top-10 w-80 bg-white rounded-xl shadow-xl border border-border z-50 overflow-hidden">
            <div class="flex items-center justify-between px-4 py-3 border-b border-border">
              <span class="font-semibold text-sm text-foreground">Notifications</span>
              <span class="text-xs text-muted-foreground">2 new</span>
            </div>
            <button class="w-full flex items-start gap-3 px-4 py-3 hover:bg-secondary transition-colors border-b border-border text-left">
              <span class="w-2 h-2 rounded-full mt-1.5 flex-shrink-0 bg-primary"></span>
              <div class="flex-1 min-w-0">
                <span class="text-xs font-semibold text-muted-foreground">Advisory · </span>
                <span class="text-xs text-foreground leading-snug">Q2 2026 Company Performance Update</span>
                <p class="text-xs text-muted-foreground mt-0.5">2 hrs ago</p>
              </div>
            </button>
          </div>
        </div>

        <!-- Profile Dropdown -->
        <div class="relative">
          <button id="profile-btn" class="flex items-center gap-2 pl-3 border-l border-border hover:bg-secondary/60 rounded-lg pr-2 py-1 transition-colors">
            <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center flex-shrink-0">
              <span class="text-white text-xs font-semibold">AD</span>
            </div>
            <div class="hidden sm:block text-left">
              <div class="text-sm font-medium text-foreground leading-tight">Alex Diaz</div>
              <div class="text-xs text-muted-foreground">Employee</div>
            </div>
            <i data-lucide="chevron-down" id="profile-chevron" style="width: 14px; height: 14px;" class="text-muted-foreground transition-transform duration-200"></i>
          </button>

          <div id="profile-dropdown" class="hidden absolute right-0 top-12 w-56 bg-white rounded-xl shadow-xl border border-border z-50 overflow-hidden" style="box-shadow: 0 8px 30px rgba(0,0,0,0.12)">
            <div class="px-4 py-3 border-b border-border bg-secondary/40">
              <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-primary flex items-center justify-center flex-shrink-0">
                  <span class="text-white text-xs font-semibold">AD</span>
                </div>
                <div class="min-w-0">
                  <div class="text-sm font-semibold text-foreground truncate">Alex Diaz</div>
                  <div class="text-xs text-muted-foreground truncate">Senior Backend Developer</div>
                </div>
              </div>
            </div>
            <div class="py-1">
              <button class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-foreground hover:bg-secondary transition-colors text-left" onclick="window.location.href='employee-profile.html'">
                <i data-lucide="user" style="width: 15px; height: 15px;" class="text-muted-foreground flex-shrink-0"></i>
                My Profile
              </button>
            </div>
            <div class="border-t border-border py-1">
              <button onclick="window.location.href='../index.html'" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-colors text-left">
                <i data-lucide="log-out" style="width: 15px; height: 15px;" class="flex-shrink-0"></i>
                Log Out
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto p-6 bg-background relative z-10">
      <div class="space-y-5 max-w-4xl mx-auto">
        <!-- Latest Highlight -->
        <div id="latest-eval-container" class="hidden bg-primary rounded-2xl p-6 flex items-center gap-6 relative overflow-hidden">
          <div class="absolute right-0 top-0 w-64 h-64 rounded-full bg-white/5 -translate-y-1/3 translate-x-1/4"></div>
          <div class="flex-1">
            <p class="text-white/60 text-xs uppercase tracking-wider font-semibold mb-1">Latest Evaluation</p>
            <h2 class="text-white font-bold text-xl mb-1" id="eval-period"></h2>
            <p class="text-white/60 text-sm" id="eval-meta"></p>
            <p class="text-white/70 text-sm mt-3 max-w-md leading-relaxed" id="eval-comments"></p>
          </div>
          <div class="text-center z-10 flex-shrink-0">
            <div class="w-28 h-28 rounded-2xl bg-white/10 flex flex-col items-center justify-center">
              <span class="text-4xl font-bold text-white" id="eval-rating"></span>
              <span class="text-white/60 text-sm">/ 5.0</span>
            </div>
            <div class="flex items-center justify-center gap-0.5 mt-2" id="eval-stars">
              <!-- JS populated -->
            </div>
          </div>
        </div>

        <!-- Evaluations List -->
        <div class="space-y-4" id="evaluations-list">
          <!-- JS populated -->
        </div>
      </div>
    </main>
  </div>

  <script src="../js/shared.js"></script>
  <script type="module" src="../js/employee-performance.js"></script>
</body>
</html>
